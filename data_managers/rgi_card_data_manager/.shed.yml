categories:
- Data Managers
description: Data manager to install CARD databases for use with RGI tools
long_description: |
  Installs a release of the Comprehensive Antibiotic Resistance Database (CARD)
  for use with the RGI Galaxy tools. Downloads card-data.tar.bz2, extracts
  card.json, and runs rgi card_annotation to produce the annotation FASTAs
  required by RGI main and RGI bwt. The installed database is registered in
  the rgi_card data table.
name: data_manager_rgi_card
owner: tcollins
homepage_url: https://github.com/arpcard/rgi
remote_repository_url: https://github.com/tcollins2011/collins_galaxy_tools/tree/main/data_managers/rgi_card_data_manager
type: unrestricted
